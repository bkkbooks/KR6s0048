body:
  text: 身有罪盡懺悔已歸命禮三寶志心勸請十方佛見在成道者我請轉法輪安樂諸衆生十方一切佛若欲捨受命我今投面禮勸請令久住勸請已歸命禮三寶志心隨喜所有布施福持戒修禪定惠從身口意生去來今所有習學三乘人具足一乘者無量人天福衆等皆隨喜隨喜已歸命禮三寶志心回向我所作福業一切皆和合為度群生故正回向佛道罪應如是懺勸請隨喜福回向於菩提回向已歸命禮三寶志心發願願諸衆生等悉發菩提心繫心常思念十方一切佛復願諸衆生永破諸煩惱了了見佛性由如妙德等發願已歸命禮三寶白衆生等聽説寅朝清淨偈欲求寂滅樂當學沙門法衣食繼身命精麁隨衆等今日寅朝清淨各記六念念佛念法念僧念戒念天念施啓佛及法事並依上文又黃昏偈西方日已沒塵勞猶未除老病死時至相看不久居念念催年促猶如少水魚勸諸行道衆修學至無餘中夜無常偈衆等各各觀身處骨肉巾皮相浮堅地水火風假成身四大分散元無主一函臭肉變成疽散分爛𭶦從灰土後夜無常偈時光千流轉忽至五更初無常念念至恆與死王居勸諸行道衆修學至無餘六根懺我等自從無量劫恆被六賊欺居一相之中而共生分別眼根常愛色耳分別音聲鼻惑著餘香舌鎮貪諸味身常樂受觸意相遍攀緣猶斯顛倒心固沈輪生死海懺悔已歸命禮三願我等從今日乃至證菩提六賊恆為成六通三毒變為三解脫同一真如平等惺不捨生死證涅槃恆於六趣濟群生共證如來無上道志心發願願我眼根常見佛願耳恆聞説法聲願鼻不嗅一餘香願口常誦波羅蜜願身不染諸邪境願意不攀有相緣願心能除煩惱賊願我恆到涅槃城我願衆生盡成佛我願普證涅槃因發願已歸命禮三寶衆生無邊誓願度煩惱無邊誓願斷法門無盡誓願學無上佛道誓願成聽説知時無常偈色情若不住草動染諸塵隨緣遍六趣剎那不繫停知身如電影悟趣若浮雲了知心本淨回願入真門
